<div class="container page-content">
    <div class="page-header">
        <h1>Checkout</h1>
        <a routerLink="/cart" class="back-link">← Back to Cart</a>
    </div>

    <div *ngIf="items.length === 0 && !placing" class="empty-state">
        <div class="empty-state-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <a routerLink="/products" class="btn btn-primary">Go Shopping</a>
    </div>

    <div *ngIf="items.length > 0" class="checkout-layout">

        <!-- Order review -->
        <div class="checkout-items">
            <h2>Order Review</h2>
            <div class="order-item" *ngFor="let item of items">
                <img [src]="getImage(item)" [alt]="item.product.name" class="order-item-img"
                    (error)="onImgError($event)" />
                <div class="order-item-body">
                    <span class="order-item-name">{{ item.product.name }}</span>
                    <span class="order-item-qty">Qty: {{ item.quantity }}</span>
                </div>
                <span class="order-item-price">
                    {{ (item.product.price * item.quantity) | currency:'INR':'symbol':'1.2-2' }}
                </span>
            </div>
        </div>

        <!-- Payment & confirm -->
        <div class="checkout-panel">
            <h2>Payment Method</h2>

            <div class="payment-options">
                <label *ngFor="let method of paymentMethods" class="payment-option"
                    [class.selected]="selectedMethod === method.value">
                    <input type="radio" name="payment" [value]="method.value" [(ngModel)]="selectedMethod" />
                    <span class="payment-icon">{{ method.icon }}</span>
                    <span class="payment-label">{{ method.label }}</span>
                    <span class="payment-check" *ngIf="selectedMethod === method.value">✓</span>
                </label>
            </div>

            <div class="alert alert-error" *ngIf="error">{{ error }}</div>

            <div class="divider"></div>

            <div class="checkout-total">
                <span>Total</span>
                <span>{{ total | currency:'INR':'symbol':'1.2-2' }}</span>
            </div>

            <button class="btn btn-primary btn-lg btn-full" [disabled]="!selectedMethod || placing"
                (click)="placeOrder()">
                <span *ngIf="placing" class="btn-spinner"></span>
                {{ placing ? 'Placing Order...' : 'Place Order' }}
            </button>

            <p class="secure-note">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                Secure checkout
            </p>
        </div>
    </div>
</div>
