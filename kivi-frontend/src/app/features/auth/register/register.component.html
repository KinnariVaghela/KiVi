<div class="auth-page">
    <div class="auth-card fade-in-up">
        <div class="auth-header">
            <a routerLink="/" class="auth-logo">
                <span class="brand-ki">Ki</span><span class="brand-vi">Vi</span>
            </a>
            <h1>Create your account</h1>
        </div>

        <div class="alert alert-error" *ngIf="error">{{ error }}</div>
        <div class="alert alert-success" *ngIf="success">{{ success }}</div>

        <form (ngSubmit)="onSubmit()" *ngIf="!success" novalidate>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" [(ngModel)]="form.name" class="form-input"
                        [class.input-error]="errors['name']" placeholder="Jane Doe" />
                    <span class="field-error" *ngIf="errors['name']">{{ errors['name'] }}</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" [(ngModel)]="form.email" class="form-input"
                        [class.input-error]="errors['email']" placeholder="you@example.com" />
                    <span class="field-error" *ngIf="errors['email']">{{ errors['email'] }}</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-password-wrap">
                        <input [type]="showPw ? 'text' : 'password'" name="password" [(ngModel)]="form.password"
                            class="form-input" [class.input-error]="errors['password']"
                            placeholder="Min. 6 characters" />
                        <button type="button" class="toggle-pw" (click)="showPw = !showPw">
                            {{ showPw ? 'Hide' : 'Show' }}
                        </button>
                    </div>
                    <span class="field-error" *ngIf="errors['password']">{{ errors['password'] }}</span>
                    <span class="form-hint" *ngIf="!errors['password']">Must be at least 6 characters</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" [(ngModel)]="form.phone" class="form-input"
                        [class.input-error]="errors['phone']" placeholder="+1 555 000 0000" />
                    <span class="field-error" *ngIf="errors['phone']">{{ errors['phone'] }}</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <textarea name="address" [(ngModel)]="form.address" class="form-textarea"
                    [class.input-error]="errors['address']" placeholder="123 Main St, City, Country"
                    rows="2"></textarea>
                <span class="field-error" *ngIf="errors['address']">{{ errors['address'] }}</span>
            </div>

            <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
                <span *ngIf="loading" class="btn-spinner"></span>
                {{ loading ? 'Creating account...' : 'Create Account' }}
            </button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a routerLink="/auth/login">Sign in</a>
        </p>
    </div>
</div>
